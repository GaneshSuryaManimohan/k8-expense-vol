apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql
  namespace: expense
spec:
  storageClassName: expense-ebs-sc # Reference the custom StorageClass
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 6Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: expense
spec:
  selector:
    matchLabels:
    # has to match .spec.template.metadata.labels
      component: mysql 
      project: expense
      tier: database
  serviceName: "mysql"
  replicas: 3 # by default is 1
  template:
    metadata:
      labels:
        component: mysql 
        project: expense
        tier: database
    spec:
      containers:
      - name: mysql
        image: tgsmanimohan/mysql:v1.0
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: mysql
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql
        persistentVolumeClaim:
          claimName: mysql
 